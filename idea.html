<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner & Search</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            margin-top: 50px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.3);
        }
        h2 {
            margin-bottom: 20px;
        }
        button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #2ecc71;
        }
        #reader {
            width: 100%;
            margin-top: 20px;
            display: none;
        }
        .results-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: none;
        }
        .message {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ماسح QR والبحث</h2>
        <button onclick="startScanner()">📷 مسح QR Code</button>
        <button onclick="searchData()">🔍 البحث</button>
        <p class="message" id="statusMessage"></p>
    </div>

    <div id="reader"></div>

    <div class="container results-container" id="searchResults">
        <h3>القيمة في العمود N:</h3>
        <p class="message" id="columnNValue"></p>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbw6aIcLziTZNG0dOQ1-4srUdOD7cy47LiMBtrvegeMvb8YyQsrnAzdfqZoU75DtN11a/exec";
        let scannedValue = "";
        let scanner;

        function startScanner() {
            document.getElementById("reader").style.display = "block";
            if (!scanner) {
                scanner = new Html5Qrcode("reader");
            }

            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    scanner.stop().then(() => {
                        document.getElementById("reader").style.display = "none";
                        scannedValue = decodedText;
                        document.getElementById("statusMessage").innerText = "✅ تم مسح الكود بنجاح!";
                    }).catch(err => console.error(err));
                },
                (errorMessage) => { console.warn(errorMessage); }
            ).catch(err => console.error(err));
        }

        function searchData() {
            if (scannedValue === "") {
                alert("❌ يرجى مسح كود QR أولاً!");
                return;
            }

            fetch(`${scriptUrl}?qrValue=${encodeURIComponent(scannedValue)}`)
                .then(response => response.text())
                .then(data => {
                    document.getElementById("columnNValue").innerText = data;
                    document.getElementById("searchResults").style.display = "block";
                })
                .catch(error => console.error("Error:", error));
        }
    </script>

</body>
</html>
